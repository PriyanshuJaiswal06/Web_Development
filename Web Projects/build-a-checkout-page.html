<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
    <main>
        <h1>Checkout</h1>
        <section>
            <h2>Your Cart</h2>
            <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="A scrambled rubik's Cube">
        </section>
        <section>
            <h2>Payment Information</h2>
            <form>
                <input id="card-name" name="card-name" type="text" required></input>
                <label for="card-name"><span aria-hidden="true">*</span>Card-name</label>
                <input id="card-number" name="card-number" type="text" span="*" aria-hidden="true"
                    aria-describedby="card-number-help" required></input>
                <p id="card-number-help">Please Enter your card number here.</p>
                <label for="card-number" required><span aria-hidden="true">*</span>Card-number</label>
            </form>
        </section>
    </main>
</body>

</html>
