<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTML Audio and Video Lab</title>
</head>
<body>
  <h1>Audio and Video Player</h1>
  <section>
    <h2>Khat</h2>
    <video controls width="640">
        <source src="Media/Khat.mp4" type="video/mp4">
    </video>
  </section>
  <section>
    <h2>Those Eyes</h2>
    <audio controls loop>
        <source src="Media/Those_Eyes.mp3" type="audio/mpeg">
    </audio>
  </section>
</body>
</html>
