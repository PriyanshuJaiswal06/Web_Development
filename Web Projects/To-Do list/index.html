<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <div class="to-do">
        <h1>My To-Do list</h1>
        <ul class="todo-list">
            <li>
                <label>
                     <input 
                    type = "checkbox"/>Statistics

                </label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://seek.onlinedegree.iitm.ac.in/courses/ns_25t3_ma1004" target="_blank">Lectures
                        </a>
                    </li>
                </ul>
            </li>
            <li>
                <input 
                    type = "checkbox"
                    id= "Mathematics"
                    />
                <label for="Mathematics">Mathematics</label>
                <ul class="sub-item">
                    <li><a class="sub-item-link" href="https://seek.onlinedegree.iitm.ac.in/courses/ns_25t3_ma1003" target="_blank">Lectures</a></li>
                </ul>
            </li>
            <li>
                <input
                    type = "checkbox"
                    id= "Python"
                    />
                <label for="Python">Python</label>
                <ul class="sub-item">
                    <li><a class="sub-item-link" href="https://www.kaggle.com/" target="_blank">Lectures</a></li>
                </ul>
            </li>
            <li>
                <input 
                    type = "checkbox"
                    id= "Web-dev"
                    />
                <label for="Web-dev">Web Development</label>
                <ul class="sub-item">
                    <li><a class="sub-item-link" href="https://www.freecodecamp.org/learn/full-stack-developer/" target="_blank">Lectures</a>
                    </li>
                </ul>
            </li>
        </ul>
    </div>
</body>

</html>
