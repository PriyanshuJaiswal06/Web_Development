

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Survey Form</title>
</head>

<body>
  <header>
    <h1 id="title">Survey Form</h1>
    <p id="description">Thanks for using our service. Please leave a review about our product.</p>
  </header>
  <main>

    <fieldset>
      <form id="survey-form">
        <label id="name-label">Enter your name</label>
        <input type="text" id="name" required placeholder="Enter your name">
        <label id="email-label">Enter you mail</label>
        <input type="email" id="email" required placeholder="Enter your email">
        <label id="number-label">Enter your phone number</label>
        <input id="number" type="number" min="5" max="20" placeholder="Enter a valid phone number">
        
        <select id="dropdown">
          <option></option>
          <option></option>
        </select>
        <label>
          <input type="radio" name="Rating" value="Good">
        </label>
        <label>
          <input type="radio" name="Rating" value="Best">
        </label>
        <label>
          <input type="checkbox" value=".">
        </label>
        <label>
          <input type="checkbox" value=".">
        </label>
        <textarea>
              </textarea>
        <input type="submit" id="submit">
      </form>
    </fieldset>
  </main>
</body>

</html>
